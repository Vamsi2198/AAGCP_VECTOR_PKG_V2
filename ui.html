<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AAGCP Vector Demo UI</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background: #1b1d24;
      color: #f4f7fb;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      padding: 16px;
      flex-wrap: wrap;
      background: #272b35;
      border-bottom: 1px solid #3e4450;
    }

    button {
      border: none;
      border-radius: 6px;
      background: #4f5bff;
      color: white;
      padding: 12px 18px;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease;
      font-size: 14px;
    }

    button:hover {
      transform: translateY(-1px);
      background: #6f7bff;
    }

    .terminal {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      background: #0f1218;
      color: #dfe8ff;
      font-family: "Courier New", Courier, monospace;
      font-size: 14px;
      line-height: 1.5;
    }

    .terminal-line {
      white-space: pre-wrap;
      margin-bottom: 8px;
    }

    .terminal-line span {
      display: inline-block;
    }

    .response {
      color: #c3f3c9;
    }

    .info {
      color: #8eaaff;
    }

    .warning {
      color: #f8c68b;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <button data-action="health">Health</button>
    <button data-action="ingest">Ingest</button>
    <button data-action="queryAnalyst">Query Analyst</button>
    <button data-action="queryCompliance">Query Compliance</button>
    <button data-action="erase">Erase</button>
    <button data-action="audit">Audit</button>
  </div>

  <div class="terminal" id="terminal"></div>

  <script>
    const terminal = document.getElementById('terminal');

    function log(message, type = 'response') {
      const line = document.createElement('div');
      line.className = 'terminal-line ' + type;
      line.textContent = message;
      terminal.appendChild(line);
      terminal.scrollTop = terminal.scrollHeight;
    }

    function sendRequest(url, method = 'GET', body = null) {
      const options = { method, headers: {} };
      if (body) {
        options.headers['Content-Type'] = 'application/json';
        options.body = JSON.stringify(body);
      }
      return fetch(url, options).then(async response => {
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.message || response.statusText);
        }
        return data;
      });
    }

    const actions = {
      health: () => sendRequest('/health'),
      ingest: () => sendRequest('/ingest', 'POST'),
      queryAnalyst: () => sendRequest('/query', 'POST', {
        role: 'ANALYST_ROLE',
        query: 'patients diagnosed with type 2 diabetes',
      }),
      queryCompliance: () => sendRequest('/query', 'POST', {
        role: 'COMPLIANCE_OFFICER',
        query: 'patients diagnosed with type 2 diabetes',
      }),
      erase: () => sendRequest('/erase', 'POST', { subject: 'Ramesh Iyer' }),
      audit: () => sendRequest('/audit'),
    };

    function printJson(prefix, data) {
      log(prefix, 'info');
      if (typeof data === 'string') {
        log(data, 'response');
        return;
      }
      if (Array.isArray(data)) {
        data.forEach(item => log(JSON.stringify(item), 'response'));
        return;
      }
      Object.entries(data).forEach(([key, value]) => {
        log(`${key}: ${JSON.stringify(value)}`, 'response');
      });
    }

    document.querySelectorAll('button[data-action]').forEach(button => {
      button.addEventListener('click', () => {
        const action = button.dataset.action;
        log('> ' + button.textContent, 'info');
        actions[action]().then(result => {
          if (action === 'queryAnalyst' || action === 'queryCompliance') {
            log(`Query results for role ${result.role}:`, 'info');
            result.results.forEach(hit => {
              log(`[${hit.id}] score=${hit.score}`, 'response');
              log(hit.text, 'response');
            });
            return;
          }
          if (action === 'erase') {
            printJson('Erase result:', result);
            return;
          }
          if (action === 'audit') {
            printJson('Audit summary:', result);
            return;
          }
          printJson('Response:', result);
        }).catch(err => {
          log(`ERROR: ${err.message}`, 'warning');
        });
      });
    });

    log('Simple AAGCP-Vector UI ready. Click a button to see output below.', 'info');
  </script>
</body>
</html>
